<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editing Agent</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 12px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #fbbf24; }
    .header .badge { background: #2d2614; color: #fbbf24; border: 1px solid #92400e; padding: 2px 8px; border-radius: 9999px; font-size: 11px; }
    .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 49px); }
    .sidebar { background: #141622; border-right: 1px solid #2d3748; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; }
    .card h2 { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    select, input[type="number"] {
      background: #0f1117; border: 1px solid #374151; border-radius: 6px;
      color: #e2e8f0; padding: 8px 10px; font-size: 13px; outline: none;
    }
    select:focus, input:focus { border-color: #7c3aed; }
    label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #e2e8f0; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:hover:not(:disabled) { background: #6d28d9; }
    .project-list, .episode-list { display: flex; flex-direction: column; gap: 4px; }
    .project-item, .episode-item { background: #0f1117; border: 1px solid #374151; border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 12px; color: #94a3b8; transition: border-color 0.12s; }
    .project-item:hover, .episode-item:hover { border-color: #4c1d95; }
    .project-item.selected, .episode-item.selected { border-color: #7c3aed; background: #1e1040; color: #c4b5fd; }
    .episode-item .ep-title { font-size: 12px; color: #e2e8f0; font-weight: 600; }
    .episode-item.selected .ep-title { color: #c4b5fd; }
    .ep-sub { display: flex; gap: 4px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 9999px; }
    .status-done { background: #064e3b; color: #34d399; }
    .status-pending { background: #1e3a5f; color: #60a5fa; }
    .status-running { background: #2d1b00; color: #fbbf24; }
    .status-error { background: #450a0a; color: #f87171; }
    .status-not_started { background: #1a1d2e; color: #64748b; border: 1px solid #374151; }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { background: #0f1117; border: 1px solid #374151; border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 90px; }
    .stat .value { font-size: 22px; font-weight: 700; color: #a78bfa; }
    .stat .label { font-size: 11px; color: #64748b; }
    .warnings { background: #2d1b00; border: 1px solid #92400e; border-radius: 6px; padding: 12px; }
    .warnings .title { font-size: 12px; font-weight: 600; color: #fbbf24; margin-bottom: 6px; }
    .warnings ul { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .warnings li { font-size: 12px; color: #d97706; }
    .warnings li::before { content: "⚠ "; }
    .error-box { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 6px; padding: 12px; font-size: 12px; color: #f87171; }
    .file-path { background: #0f1117; border: 1px solid #374151; border-radius: 6px; padding: 8px 10px; font-size: 12px; font-family: monospace; color: #e2e8f0; word-break: break-all; user-select: all; }
    .file-path-row { display: flex; flex-direction: column; gap: 4px; }
    .file-path-row .label { font-size: 11px; color: #64748b; }
    .info-note { font-size: 12px; color: #94a3b8; padding: 12px; background: #0f1117; border-radius: 6px; border-left: 3px solid #374151; line-height: 1.8; }
    .info-note ol { padding-left: 20px; }
    .info-note code { color: #c4b5fd; }
    .loading { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #374151; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px; color: #4b5563; font-size: 13px; }
  </style>
</head>
<body x-data="app()" x-init="init()">

<div class="header">
  <h1>🎬 Editing Agent</h1>
  <span class="badge">:8006</span>
  <span x-show="!healthOk" class="status-badge status-error">HOST_SHARED_DIR未設定</span>
</div>

<div class="layout">
  <!-- サイドバー：プロジェクト／エピソード -->
  <div class="sidebar">
    <div class="card">
      <h2>プロジェクト</h2>
      <div class="project-list">
        <template x-if="projects.length === 0">
          <div class="empty" style="padding:20px">プロジェクトなし</div>
        </template>
        <template x-for="pj in projects" :key="pj.id">
          <div class="project-item"
               :class="{ selected: currentProject?.id === pj.id }"
               @click="selectProject(pj)"
               x-text="pj.title || pj.id"></div>
        </template>
      </div>
    </div>

    <div class="card" x-show="currentProject">
      <h2>エピソード</h2>
      <template x-if="episodes.length === 0">
        <div style="font-size:12px;color:#4b5563">エピソードなし</div>
      </template>
      <div class="episode-list">
        <template x-for="ep in episodes" :key="ep.number">
          <div class="episode-item"
               :class="{ selected: currentEpisode?.number === ep.number }"
               @click="selectEpisode(ep)">
            <div class="ep-title">第<span x-text="ep.number"></span>話</div>
            <div class="ep-sub">
              <span class="status-badge" :class="statusClass(ep.status?.tts)" x-text="`tts: ${ep.status?.tts || 'n/a'}`"></span>
              <span class="status-badge" :class="statusClass(ep.status?.footage)" x-text="`footage: ${ep.status?.footage || 'n/a'}`"></span>
              <span class="status-badge" :class="statusClass(ep.status?.editing)" x-text="`editing: ${ep.status?.editing || 'n/a'}`"></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- メイン -->
  <div class="main">
    <template x-if="!currentEpisode">
      <div class="empty">プロジェクトとエピソードを選択してください</div>
    </template>

    <template x-if="currentEpisode">
      <div style="display:flex;flex-direction:column;gap:16px">

        <!-- 前工程ステータス -->
        <div class="card">
          <h2>前工程ステータス</h2>
          <div class="stats-row">
            <div class="stat">
              <div class="value" x-text="currentEpisode.status?.scripting || 'n/a'"></div>
              <div class="label">scripting</div>
            </div>
            <div class="stat">
              <div class="value" x-text="currentEpisode.status?.tts || 'n/a'"></div>
              <div class="label">tts（ファイル: <span x-text="currentEpisode.has_tts ? '○' : '×'"></span>）</div>
            </div>
            <div class="stat">
              <div class="value" x-text="currentEpisode.status?.footage || 'n/a'"></div>
              <div class="label">footage（ファイル: <span x-text="currentEpisode.has_footage ? '○' : '×'"></span>）</div>
            </div>
            <div class="stat">
              <div class="value" x-text="currentEpisode.status?.editing || 'n/a'"></div>
              <div class="label">editing</div>
            </div>
          </div>
        </div>

        <!-- オプション -->
        <div class="card">
          <h2>OTIO生成オプション</h2>
          <div class="form-row">
            <div class="form-group">
              <label>フレームレート (fps)</label>
              <select x-model.number="fps">
                <option :value="24">24</option>
                <option :value="30">30</option>
                <option :value="60">60</option>
              </select>
            </div>
            <div class="form-group">
              <label>パス形式</label>
              <select x-model="pathStyle">
                <option value="file_uri">file_uri（file:///D:/...）</option>
                <option value="windows">windows（生のパス、日本語パス対策）</option>
              </select>
            </div>
            <div class="form-group">
              <label>字幕の出力形式</label>
              <select x-model="subtitleFormat">
                <option value="both">both（SRT＋FCPXML）</option>
                <option value="srt">srt のみ</option>
                <option value="fcpxml">fcpxml のみ（Text+）</option>
              </select>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="speakerPrefix" x-model="speakerPrefix">
              <label for="speakerPrefix" style="margin:0">字幕に話者名を付ける</label>
            </div>
            <div class="checkbox-row">
              <input type="checkbox" id="force" x-model="force">
              <label for="force" style="margin:0">前工程未完でも強制実行（force）</label>
            </div>
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-primary" :disabled="running" @click="runEdit()">
              <template x-if="running"><span class="spinner"></span></template>
              <span x-text="running ? '生成中...' : '🎬 OTIO生成'"></span>
            </button>
          </div>
        </div>

        <!-- 字幕スタイル（FCPXML/Text+ 用・話者別） -->
        <div class="card">
          <h2>字幕スタイル（FCPXML / Text+）</h2>
          <div class="form-row" style="margin-bottom:12px">
            <div class="form-group">
              <label>縦位置 Y（センター=0 / 下=マイナス）</label>
              <input type="number" step="10" x-model.number="styleModel.position_y" style="width:120px">
            </div>
            <div class="form-group">
              <label>既定サイズ</label>
              <input type="number" step="2" x-model.number="styleModel.default.font_size" style="width:90px">
            </div>
            <div class="form-group">
              <label>縁取り太さ</label>
              <input type="number" step="1" min="0" x-model.number="styleModel.default.stroke_width" style="width:90px">
            </div>
            <div class="form-group">
              <label>縁取り色</label>
              <input type="color" :value="rgbaToHex(styleModel.default.stroke_color)"
                     @input="styleModel.default.stroke_color = hexToRgba($event.target.value)"
                     style="width:48px;height:34px;padding:2px;background:#0f1117;border:1px solid #374151;border-radius:6px">
            </div>
          </div>

          <label style="margin-bottom:6px">話者別の文字色・装飾</label>
          <template x-if="speakers.length === 0">
            <div style="font-size:12px;color:#4b5563">話者情報なし（tts.json未生成）</div>
          </template>
          <div style="display:flex;flex-direction:column;gap:6px">
            <template x-for="sp in speakers" :key="sp.speaker_id">
              <div class="form-row" style="align-items:center;gap:10px;background:#0f1117;border:1px solid #374151;border-radius:6px;padding:8px 10px">
                <span style="font-size:13px;color:#e2e8f0;min-width:120px"
                      x-text="sp.speaker_name || sp.speaker_id"></span>
                <input type="color" :value="rgbaToHex(speakerStyle(sp.speaker_id).color)"
                       @input="setSpeakerColor(sp.speaker_id, $event.target.value)"
                       style="width:48px;height:34px;padding:2px;background:#0f1117;border:1px solid #374151;border-radius:6px">
                <div class="form-group">
                  <label>サイズ(任意)</label>
                  <input type="number" step="2" placeholder="既定" style="width:80px"
                         :value="speakerStyle(sp.speaker_id).font_size ?? ''"
                         @input="setSpeakerNum(sp.speaker_id, 'font_size', $event.target.value)">
                </div>
                <div class="checkbox-row">
                  <input type="checkbox" :id="`bold_${sp.speaker_id}`"
                         :checked="!!speakerStyle(sp.speaker_id).bold"
                         @change="setSpeakerBool(sp.speaker_id, 'bold', $event.target.checked)">
                  <label :for="`bold_${sp.speaker_id}`" style="margin:0">太字</label>
                </div>
              </div>
            </template>
          </div>

          <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
            <button class="btn btn-primary" :disabled="savingStyle" @click="saveSubtitleStyle()">
              <template x-if="savingStyle"><span class="spinner"></span></template>
              <span x-text="savingStyle ? '保存中...' : '💾 字幕スタイルを保存'"></span>
            </button>
            <span x-show="styleSaved" style="font-size:12px;color:#34d399">保存しました</span>
          </div>
          <div class="info-note" style="margin-top:12px">
            焼けるのは <code>色 / サイズ / 太字・斜体 / 縁取り / 位置</code> です。
            <strong>Outside Only・背景ボックス・影 はFCPXMLに焼けない</strong>ため、
            Davinci側で<strong>全字幕を選択 → 一括設定</strong>してください（1回で済みます）。
          </div>
        </div>

        <!-- エラー -->
        <template x-if="error">
          <div class="error-box" x-text="error"></div>
        </template>

        <!-- 結果 -->
        <template x-if="result">
          <div class="card">
            <h2>生成結果</h2>
            <div class="stats-row" style="margin-bottom:12px">
              <div class="stat">
                <div class="value" x-text="formatDuration(result.timeline?.duration_sec)"></div>
                <div class="label">duration</div>
              </div>
              <div class="stat">
                <div class="value" x-text="result.timeline?.video_clip_count"></div>
                <div class="label">video clips</div>
              </div>
              <div class="stat">
                <div class="value" x-text="result.timeline?.audio_clip_count"></div>
                <div class="label">audio clips</div>
              </div>
              <div class="stat">
                <div class="value" x-text="result.timeline?.subtitle_count"></div>
                <div class="label">subtitles</div>
              </div>
              <div class="stat">
                <div class="value" x-text="result.timeline?.marker_count"></div>
                <div class="label">markers</div>
              </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
              <div class="file-path-row">
                <span class="label">timeline.otio（ホスト側パス）</span>
                <div class="file-path" x-text="hostFilePath(result.files?.otio)"></div>
              </div>
              <div class="file-path-row" x-show="result.files?.srt">
                <span class="label">subtitles.srt（ホスト側パス）</span>
                <div class="file-path" x-text="hostFilePath(result.files?.srt)"></div>
              </div>
              <div class="file-path-row" x-show="result.files?.fcpxml">
                <span class="label">subtitles.fcpxml（Text+ / ホスト側パス）</span>
                <div class="file-path" x-text="hostFilePath(result.files?.fcpxml)"></div>
              </div>
              <div class="file-path-row">
                <span class="label">edit.json（ホスト側パス）</span>
                <div class="file-path" x-text="hostFilePath('edit/edit.json')"></div>
              </div>
            </div>

            <template x-if="result.warnings && result.warnings.length > 0">
              <div class="warnings">
                <div class="title">⚠ Warnings</div>
                <ul>
                  <template x-for="w in result.warnings" :key="w.message">
                    <li x-text="`[${w.code}] ${w.message}`"></li>
                  </template>
                </ul>
              </div>
            </template>
          </div>
        </template>

        <!-- Resolve取り込み手順ガイド -->
        <div class="card">
          <h2>DaVinci Resolve 取り込み手順</h2>
          <div class="info-note">
            <ol>
              <li>Resolveのプロジェクト設定でタイムラインfpsを生成fps（<span x-text="fps"></span>）に合わせる</li>
              <li><code>File → Import → Timeline → timeline.otio</code> を選択</li>
              <li>メディアがオフラインの場合: Media Poolで右クリック → <code>Relink</code></li>
              <li><strong>字幕（SRT）の場合</strong>: <code>File → Import → Subtitle → subtitles.srt</code> を字幕トラックへ追加</li>
              <li><strong>字幕（Text+）の場合</strong>: <code>File → Import → Timeline → subtitles.fcpxml</code> を読み込み、
                  生成された字幕トラックを本線タイムラインへドラッグして合流（話者別の色は焼き込み済み）</li>
              <li><strong>縁取り（Outside Only）・背景ボックス・影</strong>は、字幕クリップを<strong>全選択 → インスペクタで一括設定</strong></li>
            </ol>
          </div>
        </div>

      </div>
    </template>
  </div>
</div>

<script>
function app() {
  return {
    healthOk: true,
    projects: [],
    currentProject: null,
    episodes: [],
    currentEpisode: null,
    fps: 30,
    speakerPrefix: false,
    pathStyle: 'file_uri',
    subtitleFormat: 'both',
    force: false,
    running: false,
    result: null,
    error: '',
    speakers: [],
    styleModel: { position_y: -250, default: { font: 'Yu Gothic', font_size: 72, color: [1,1,1,1], bold: false, italic: false, stroke_color: [0,0,0,1], stroke_width: 3 }, per_speaker: {} },
    savingStyle: false,
    styleSaved: false,

    async init() {
      const health = await fetch('/health').then(r => r.json()).catch(() => null);
      this.healthOk = !!health?.configured;
      if (health?.otio_version) this.hostMediaRoot = health.host_shared_dir;
      await this.loadProjects();
    },

    async loadProjects() {
      const r = await fetch('/projects').then(r => r.json()).catch(() => ({ projects: [] }));
      this.projects = r.projects || [];
    },

    async selectProject(pj) {
      this.currentProject = pj;
      this.currentEpisode = null;
      this.result = null;
      this.error = '';
      const r = await fetch(`/projects/${encodeURIComponent(pj.id)}/episodes`).then(r => r.json()).catch(() => ({ episodes: [] }));
      this.episodes = r.episodes || [];
    },

    async selectEpisode(ep) {
      this.currentEpisode = ep;
      this.result = null;
      this.error = '';
      this.styleSaved = false;
      if (ep.has_edit) {
        const r = await fetch(`/projects/${encodeURIComponent(this.currentProject.id)}/episodes/${ep.number}/edit/result`);
        if (r.ok) this.result = await r.json();
      }
      await this.loadSpeakersAndStyle(ep);
    },

    async loadSpeakersAndStyle(ep) {
      const pid = encodeURIComponent(this.currentProject.id);
      const sp = await fetch(`/projects/${pid}/episodes/${ep.number}/speakers`).then(r => r.json()).catch(() => ({ speakers: [] }));
      this.speakers = sp.speakers || [];
      const st = await fetch(`/projects/${pid}/subtitle-style`).then(r => r.json()).catch(() => ({ style: {} }));
      const saved = st.style || {};
      // 既定にマージ（保存値があれば優先）
      const d = this.styleModel.default;
      this.styleModel = {
        position_y: saved.position_y ?? -250,
        default: { ...d, ...(saved.default || {}) },
        per_speaker: { ...(saved.per_speaker || {}) },
      };
    },

    speakerStyle(sid) {
      if (!this.styleModel.per_speaker[sid]) {
        this.styleModel.per_speaker[sid] = { color: [...this.styleModel.default.color] };
      }
      return this.styleModel.per_speaker[sid];
    },

    setSpeakerColor(sid, hex) { this.speakerStyle(sid).color = this.hexToRgba(hex); },
    setSpeakerBool(sid, key, val) { this.speakerStyle(sid)[key] = val; },
    setSpeakerNum(sid, key, val) {
      const s = this.speakerStyle(sid);
      if (val === '' || val === null) delete s[key];
      else s[key] = Number(val);
    },

    rgbaToHex(rgba) {
      const c = rgba || [1,1,1,1];
      const h = n => Math.round(Math.max(0, Math.min(1, n)) * 255).toString(16).padStart(2, '0');
      return `#${h(c[0])}${h(c[1])}${h(c[2])}`;
    },
    hexToRgba(hex) {
      const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex || '');
      if (!m) return [1,1,1,1];
      return [parseInt(m[1],16)/255, parseInt(m[2],16)/255, parseInt(m[3],16)/255, 1];
    },

    async saveSubtitleStyle() {
      this.savingStyle = true;
      this.styleSaved = false;
      try {
        const r = await fetch(`/projects/${encodeURIComponent(this.currentProject.id)}/subtitle-style`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ style: this.styleModel }),
        });
        if (r.ok) { this.styleSaved = true; setTimeout(() => this.styleSaved = false, 2500); }
        else { const d = await r.json(); this.error = d.detail || `保存エラー（HTTP ${r.status}）`; }
      } catch (e) {
        this.error = `通信エラー: ${e}`;
      } finally {
        this.savingStyle = false;
      }
    },

    async runEdit() {
      this.running = true;
      this.error = '';
      try {
        const r = await fetch(`/projects/${encodeURIComponent(this.currentProject.id)}/episodes/${this.currentEpisode.number}/edit/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fps: this.fps,
            speaker_prefix: this.speakerPrefix,
            path_style: this.pathStyle,
            subtitle_format: this.subtitleFormat,
            force: this.force,
          }),
        });
        const data = await r.json();
        if (!r.ok) {
          this.error = data.detail || `エラー（HTTP ${r.status}）`;
          return;
        }
        this.result = data.edit;
        await this.selectProject(this.currentProject);
        this.currentEpisode = this.episodes.find(e => e.number === this.currentEpisode.number) || this.currentEpisode;
      } catch (e) {
        this.error = `通信エラー: ${e}`;
      } finally {
        this.running = false;
      }
    },

    hostFilePath(relPath) {
      if (!this.result || !relPath) return '';
      const root = this.result.host_media_root || '';
      const epNum = String(this.currentEpisode.number).padStart(2, '0');
      const rel = relPath.replace(/\//g, '\\');
      return `${root}\\projects\\${this.currentProject.id}\\episodes\\ep${epNum}\\${rel}`;
    },

    statusClass(status) {
      if (status === 'done') return 'status-done';
      if (status === 'pending') return 'status-pending';
      if (status === 'running') return 'status-running';
      if (status === 'error') return 'status-error';
      return 'status-not_started';
    },

    formatDuration(sec) {
      if (!sec) return '-';
      const m = Math.floor(sec / 60);
      const s = Math.round(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    },
  };
}
</script>
