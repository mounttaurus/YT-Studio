services:
  scripting-agent:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    ports:
      - "8002:8002"
    volumes:
      - ../shared:/shared
      - ./app:/app/app
    env_file:
      - ../.env
    environment:
      - SHARED_DIR=/shared
    networks:
      - youtube-auto-net
    restart: unless-stopped

networks:
  youtube-auto-net:
    external: true
    name: youtube-auto-net
